name: Build Android APK

# Trigger:
# - manual: Actions tab -> "Run workflow"
# - push do main (jesli zmiana dotyczy kodu mobilnego, nie tylko docs)
# - push do galezi feat/* / fix/* (do testow przed merge)
on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'EXPO_PUBLIC_API_URL (np. https://dev.veloryn.pl)'
        required: false
        default: 'https://dev.veloryn.pl'
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
    paths-ignore:
      - '**.md'
      - '.gitignore'

# Pojedynczy job dla kazdej galezi — anuluje poprzedni jesli przyszedl nowy push.
concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + build-tools
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Run expo prebuild (generate android/ folder)
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://dev.veloryn.pl' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          # Wylacz Sentry source-map upload — wymaga SENTRY_AUTH_TOKEN (osobny secret).
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
        run: |
          npx expo prebuild --platform android --no-install --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Gradle assembleDebug
        working-directory: android
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://dev.veloryn.pl' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          # Mniej pamieci niz default — runner ma 7 GB.
          GRADLE_OPTS: '-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.caching=true'
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name '*.apk' -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "::error::APK nie znaleziony w android/app/build/outputs/apk/debug"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "APK gotowy: $APK_PATH ($APK_SIZE)"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: veloryn-mobile-debug-${{ github.sha }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 14
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Veloryn mobile — debug APK"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **API URL:** \`${{ github.event.inputs.api_url || 'https://dev.veloryn.pl' }}\`"
            echo "- **APK:** dostepny w sekcji *Artifacts* tego runa (14 dni)."
            echo ""
            echo "Pobierz, zainstaluj na telefonie, rozszerz logcat na crashe natywne."
          } >> "$GITHUB_STEP_SUMMARY"
